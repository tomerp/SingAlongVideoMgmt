# Local PostgreSQL for development
# Run: docker compose up -d
# Then: DATABASE_URL="postgresql://postgres:postgres@localhost:5432/singalong" npm run db:push
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: singalong
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
